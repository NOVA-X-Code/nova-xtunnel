# NOVA-XTUNNEL Web Panel Configuration File
# Location: /etc/nova-xtunnel/panel.conf

[panel]
# Web server configuration
host = 127.0.0.1
port = 5000
debug = false
secret_key = CHANGE_THIS_TO_RANDOM_STRING

[database]
path = /var/www/nova-xtunnel-panel/panel.db

[security]
bcrypt_rounds = 12
session_timeout = 3600
rate_limit = 200
rate_limit_period = 86400

[bandwidth]
update_interval = 30
retention_days = 90

[ssh]
base_dir = /home
shell = /usr/sbin/nologin
group = nxtunnel

[logging]
level = info
access_log = /var/log/nova-xtunnel-panel/access.log
error_log = /var/log/nova-xtunnel-panel/error.log

[backup]
enabled = true
interval = 86400
retention = 7
path = /root/backups/nova-xtunnel
